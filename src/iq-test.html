---
layout: base.njk
title: "아이큐테스트"
description: "순차형 전문 IQ 테스트: 문제를 하나씩 풀고 마지막에 결과를 확인하세요."
permalink: "/pages/iq-test.html"
---

<main style="padding:20px;">
  <section style="max-width:600px;margin:0 auto 24px;text-align:center;">
    <h1>아이큐테스트</h1>
    <p>총 <span id="totalQuestions">20</span>문항, 제한시간 20분</p>
  </section>

  <!-- 시작 버튼 -->
  <div style="text-align:center; margin-bottom:32px;">
    <button id="startBtn"
            style="padding:12px 24px;background:#0074D9;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:1rem;">
      IQ 테스트 시작
    </button>
  </div>

  <!-- 퀴즈 영역 (초기에는 숨김) -->
  <div id="quizArea" style="display:none; max-width:700px;margin:0 auto;">

    <!-- 타이머 -->
    <div id="timer"
         style="text-align:center;font-size:18px;margin-bottom:16px;">
      남은 시간: <span id="time">20:00</span>
    </div>

    <!-- 문제 블록 -->
    <div id="questionBlock"
         style="border:1px solid #ddd;padding:20px;border-radius:8px;">
      <p id="qText" style="font-size:1.1rem;font-weight:bold;"></p>
      <img id="qImg" src="" alt="문제 이미지" style="max-width:100%;margin:12px 0;display:none;">
      <form id="answerForm"></form>
    </div>

    <!-- 이전/다음/제출 버튼 -->
    <div id="navButtons" style="display:flex;justify-content:space-between;margin-top:20px;">
      <button id="prevBtn"
              style="padding:8px 16px;border:none;background:#ccc;color:#333;border-radius:4px;cursor:pointer;visibility:hidden;">
        이전
      </button>
      <button id="nextBtn"
              style="padding:8px 16px;border:none;background:#0074D9;color:#fff;border-radius:4px;cursor:pointer;">
        다음
      </button>
      <button id="submitBtn"
              style="padding:8px 16px;border:none;background:#28a745;color:#fff;border-radius:4px;cursor:pointer;display:none;">
        완료 &amp; 결과 보기
      </button>
    </div>

    <!-- 결과 블록 -->
    <div id="resultBlock"
         style="display:none;padding:20px;background:#e8f5ff;border-radius:8px;margin-top:20px;text-align:center;font-size:18px;">
    </div>

    <!-- 재시작 버튼 -->
    <div id="restartDiv" style="display:none;text-align:center;margin-top:20px;">
      <button id="restartBtn"
              style="padding:12px 24px;background:#FF5722;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:1rem;">
        다시 테스트하기
      </button>
    </div>

  </div>
</main>

<script src="/assets/js/iq-test.js" defer></script>
