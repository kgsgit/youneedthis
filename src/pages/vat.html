<main>
  <section class="vat-header">
    <h1>쉽고 간편한 부가세 계산기</h1>

  </section>

  <div id="ads-placeholder"></div>

  <section class="vat-calculators">
    <div class="calculator">
      <div class="info-label">합계금액을 알고 있는 경우</div>
      <div class="input-group">
        <input type="text" id="totalInput" placeholder="합계금액 입력" />
        <button id="calculateTotalButton">계산하기</button>
      </div>
      <div class="note">* 합계금액을 입력하세요.</div>
      <div class="result-wrapper">
        <div class="result-line">
          <div class="label">공급가액</div>
          <div class="value-box">
            <span class="value" id="supplyResult">-</span><span class="unit">원</span>
          </div>
        </div>
        <div class="result-line">
          <div class="label">부가세</div>
          <div class="value-box">
            <span class="value" id="vatResult">-</span><span class="unit">원</span>
          </div>
        </div>
      </div>
      <div class="reset-button">
        <button id="resetTotalButton">초기화</button>
      </div>
    </div>

    <div class="calculator">
      <div class="info-label">공급가액을 알고 있는 경우</div>
      <div class="input-group">
        <input type="text" id="supplyInput" placeholder="공급가액 입력" />
        <button id="calculateSupplyButton">계산하기</button>
      </div>
      <div class="note">* 공급가액을 입력하세요.</div>
      <div class="result-wrapper">
        <div class="result-line">
          <div class="label">합계금액</div>
          <div class="value-box">
            <span class="value" id="totalResult">-</span><span class="unit">원</span>
          </div>
        </div>
        <div class="result-line">
          <div class="label">부가세</div>
          <div class="value-box">
            <span class="value" id="vatSupplyResult">-</span><span class="unit">원</span>
          </div>
        </div>
      </div>
      <div class="reset-button">
        <button id="resetSupplyButton">초기화</button>
      </div>
    </div>
  </section>
