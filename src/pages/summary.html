<div class="summary-header">
  <h1>간편요약</h1>
  <p>긴 글을 빠르게 파악할 수 있는 요약 기능입니다.</p>
</div>

<style>
  .summary-header {
    text-align: center;
    margin: 40px auto 20px;
  }
  .summary-header h1 {
    margin: 0;
    font-size: 2rem;
  }
  .summary-header p {
    margin: 8px 0 0;
    color: #555;
    font-size: 1rem;
  }

  .sum-card {
    max-width: 700px;
    margin: 0 auto 40px;
    padding: 26px 20px;
    border: 1px solid #dde3ea;
    border-radius: 8px;
    background: #fff;
  }
  .sum-card textarea {
    width: 100%;
    height: 180px;
    padding: 14px;
    font-size: 1rem;
    border: 1px solid #ccc;
    border-radius: 6px;
    resize: vertical;
  }
  .sum-card button {
    display: block;
    margin: 10px auto 0;
    padding: 10px 20px;
    font-size: 1rem;
    cursor: pointer;
  }
  #outputText {
    margin-top: 20px;
    white-space: pre-wrap;
    line-height: 1.5;
  }
</style>

<div class="sum-card">
  <textarea id="inputText" placeholder="요약할 텍스트를 입력하세요"></textarea>
  <button id="summarizeBtn">요약하기</button>
  <div id="outputText"></div>
</div>

<script>
  const STOP_WORDS = [
    "이","그","저","의","가","을","를","는","도","에","으로","에서",
    "the","and","is","in","at","of","to","a","for","on","that","this"
  ];

  function splitSentences(text) {
    return text.match(/[^\.!?]+[\.!?]+/g) || [text];
  }

  function computeWordFreq(text) {
    const freq = {};
    text.toLowerCase().replace(/[\r\n]+/g, " ")
      .split(/[\s\.,!?;:"'()]+/)
      .forEach(word => {
        if (word && !STOP_WORDS.includes(word)) {
          freq[word] = (freq[word] || 0) + 1;
        }
      });
    return freq;
  }

  function summarizeText(text, maxSentences = 5) {
    const sentences = splitSentences(text);
    const wordFreq = computeWordFreq(text);
    const scored = sentences.map(s => {
      let score = 0;
      s.toLowerCase().replace(/[\r\n]+/g, " ")
        .split(/[\s\.,!?;:"'()]+/)
        .forEach(w => { if (wordFreq[w]) score += wordFreq[w]; });
      return { sentence: s.trim(), score };
    });
    return scored.sort((a, b) => b.score - a.score)
      .slice(0, maxSentences)
      .map(item => item.sentence)
      .join(" ");
  }

  document.getElementById("summarizeBtn").addEventListener("click", () => {
    const input = document.getElementById("inputText").value.trim();
    const output = document.getElementById("outputText");
    if (!input) {
      output.innerText = "요약할 텍스트를 입력해주세요.";
      return;
    }
    output.innerText = "요약 중…";
    setTimeout(() => {
      const result = summarizeText(input, 5);
      output.innerText = result || "요약할 내용이 부족합니다.";
    }, 100);
  });
</script>
