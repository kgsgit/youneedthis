<style>
/* 페이지 전용 스타일 */
.ex-container {
  max-width: 600px;
  margin: 40px auto;
  padding: 26px 20px;
  border: 1px solid #dde3ea;
  border-radius: 8px;
  background: #fff;
}
.ex-header {
  text-align: center;
  font-size: 1.5rem;
  margin-bottom: 20px;
  font-weight: bold;
}
.ex-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.ex-flag {
  width: 32px;
  height: 20px;
  object-fit: cover;
  border: 1px solid #ccc;
  border-radius: 2px;
}
.ex-select { flex: 1; }
.ex-select select {
  width: 100%;
  padding: 10px;
  font-size: 1rem;
  border: 1px solid #ccc;
  border-radius: 4px;
}
.ex-input {
  width: 100px;
  padding: 10px;
  font-size: 1rem;
  text-align: right;
  border: 1px solid #ccc;
  border-radius: 4px;
}
.ex-equal {
  text-align: center;
  font-size: 1.2rem;
  color: #666;
  margin: 10px 0;
}
.ex-result {
  text-align: right;
}
.ex-result-value {
  font-size: 1.6rem;
  font-weight: bold;
}
.ex-result-unit {
  margin-left: 6px;
  font-size: 1rem;
  color: #555;
}
@media (max-width: 500px) {
  .ex-input { width: 80px; }
}
</style>

<main>
  <div class="ex-container">
    <div class="ex-header">환율 계산</div>

    <!-- From -->
    <div class="ex-row">
      <img id="flag-from" class="ex-flag" src="https://flagcdn.com/us.svg" alt="🇺🇸"/>
      <div class="ex-select"><select id="from-currency"></select></div>
      <input id="from-amount" class="ex-input" type="number" step="any" value="1" min="0"/>
    </div>

    <div class="ex-equal">＝</div>

    <!-- To -->
    <div class="ex-row">
      <img id="flag-to" class="ex-flag" src="https://flagcdn.com/kr.svg" alt="🇰🇷"/>
      <div class="ex-select"><select id="to-currency"></select></div>
      <div class="ex-result">
        <span id="to-amount" class="ex-result-value">-</span>
        <span id="to-unit" class="ex-result-unit">-</span>
      </div>
    </div>
  </div>
</main>

<script src="/assets/js/main.js" defer></script>
<script src="/assets/js/exchange.js" defer></script>
