---
layout: base.njk
title: "환율 계산기 | YouNeedThis"
description: "간편하게 환율을 계산해 드립니다."
permalink: "/pages/exchange.html"
---

<div class="exchange-card">
  <div class="card-header">
    <h1>환율 계산기</h1>
    <p>간편하게 환율을 계산해 드립니다.</p>
  </div>
  <form id="exchangeForm">
    <div class="form-group">
      <label for="amount">금액</label>
      <input type="number" id="amount" placeholder="금액을 입력하세요" value="1" min="0" />
    </div>
    <div class="form-group">
      <label for="fromCurrency">보낼 통화</label>
      <select id="fromCurrency">
        <option value="USD">USD</option>
        <option value="KRW">KRW</option>
        <option value="EUR">EUR</option>
      </select>
    </div>
    <div class="form-group">
      <label for="toCurrency">받을 통화</label>
      <select id="toCurrency">
        <option value="KRW">KRW</option>
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
      </select>
    </div>
    <button type="button" id="convertBtn">변환</button>
  </form>
  <div id="result"></div>
</div>

<style>
  .exchange-card {
    max-width: 500px;
    margin: 40px auto;
    padding: 20px;
    border: 1px solid #dde3ea;
    border-radius: 8px;
    background: #fff;
  }

  .exchange-card .card-header {
    text-align: center;
    padding-bottom: 12px;
    margin-bottom: 16px;
    border-bottom: 1px solid #dde3ea;
  }
  .exchange-card .card-header h1 {
    margin: 0;
    font-size: 1.8rem;
  }
  .exchange-card .card-header p {
    margin: 4px 0 0;
    color: #555;
    font-size: 1rem;
  }

  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    margin-bottom: 4px;
    font-weight: bold;
  }
  .form-group input,
  .form-group select {
    width: 100%;
    padding: 8px;
    font-size: 1rem;
    border: 1px solid #ccc;
    border-radius: 6px;
  }

  #convertBtn {
    display: block;
    width: 100%;
    padding: 10px 0;
    font-size: 1rem;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    background: #4a90e2;
    color: #fff;
  }

  #result {
    margin-top: 16px;
    font-size: 1.2rem;
    font-weight: bold;
    text-align: center;
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const amountInput = document.getElementById('amount');
    const fromSelect = document.getElementById('fromCurrency');
    const toSelect = document.getElementById('toCurrency');
    const resultDiv = document.getElementById('result');
    const convertBtn = document.getElementById('convertBtn');

    async function getRate(from, to) {
      try {
        const res = await fetch(`https://api.exchangerate-api.com/v4/latest/${from}`);
        const data = await res.json();
        return data.rates[to];
      } catch (e) {
        console.error(e);
        return null;
      }
    }

    convertBtn.addEventListener('click', async () => {
      const amount = parseFloat(amountInput.value);
      const from = fromSelect.value;
      const to = toSelect.value;
      if (isNaN(amount)) {
        resultDiv.innerText = '유효한 금액을 입력해주세요.';
        return;
      }
      resultDiv.innerText = '계산 중...';
      const rate = await getRate(from, to);
      if (!rate) {
        resultDiv.innerText = '환율을 가져오는데 실패했습니다.';
        return;
      }
      const converted = (amount * rate).toLocaleString('en-US', { maximumFractionDigits: 2 });
      resultDiv.innerText = `${amount} ${from} = ${converted} ${to}`;
    });
  });
</script>
