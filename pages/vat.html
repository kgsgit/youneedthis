<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>부가세 계산기 | YouNeedThis</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <a href="/index.html">
        <img src="../assets/img/logo.svg" alt="YouNeedThis 로고" />
      </a>
      <span class="slogan">유용한 생활도구 모음</span>
    </div>
    <nav class="nav" id="nav">
      <ul>
        <li><a href="/index.html">홈</a></li>
        <li><a href="/pages/vat.html">부가세 계산기</a></li>
        <!-- 앞으로 다른 메뉴 추가 가능 -->
      </ul>
    </nav>
    <div class="menu-toggle" id="menu-toggle">☰</div>
  </div>
</header>

<main>
  <section class="ads-space">
    <!-- 광고 자리 -->
  </section>

  <section class="vat-calculator">
    <h1>정확한 부가세 계산기</h1>
    <p>홈택스보다 더 빠르고 정확하게 계산합니다.</p>

    <div class="calculator">
      <div class="input-group">
        <input type="text" id="totalInput" placeholder="합계금액 입력" />
        <button id="calculateButton">계산하기</button>
      </div>

      <div class="results">
        <div class="result-line">
          <span>공급가액</span>
          <strong id="supplyAmount">0</strong> 원
        </div>
        <div class="result-line">
          <span>부가세</span>
          <strong id="vatAmount">0</strong> 원
        </div>
      </div>
    </div>
  </section>
</main>

<footer>
  <p>© 2025 YouNeedThis. All rights reserved.</p>
</footer>

<script src="../assets/js/main.js"></script>
<script>
document.getElementById('calculateButton').addEventListener('click', function() {
  const total = parseFloat(document.getElementById('totalInput').value.replace(/,/g, ''));
  if (!isNaN(total)) {
    const supply = Math.round(total / 1.1);
    const vat = total - supply;
    document.getElementById('supplyAmount').textContent = supply.toLocaleString();
    document.getElementById('vatAmount').textContent = vat.toLocaleString();
  }
});
</script>

</body>
</html>
