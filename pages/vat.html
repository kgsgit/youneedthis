<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="빠르고 정확한 부가세 계산기 - 합계금액 또는 공급가액을 기준으로 부가세를 쉽게 계산하세요." />
  <meta name="keywords" content="부가세 계산기, 공급가액 계산, 합계금액 계산, YouNeedThis" />
  <meta name="author" content="YouNeedThis" />
  <title>빠르게 알아보는 부가세 계산기 | YouNeedThis</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <a href="/index.html">
        <img src="../assets/img/logo.svg" alt="YouNeedThis 로고" />
      </a>
      <span class="slogan">유용한 생활도구 모음</span>
    </div>
    <nav class="nav" id="nav">
      <ul>
        <li><a href="/index.html">홈</a></li>
        <li><a href="/pages/vat.html">부가세 계산기</a></li>
      </ul>
    </nav>
    <div class="menu-toggle" id="menu-toggle">☰</div>
  </div>
</header>

<main>
  <section class="vat-header">
    <h1>쉽고 간편한 부가세 계산기</h1>
    <p>입력하는 순간 즉시 확인할 수 있습니다.</p>
  </section>

  <section class="ads-space">
    <!-- 광고 자리 -->
    광고 영역
  </section>

  <section class="vat-calculators">
    <!-- 합계금액 알고 있는 경우 -->
    <div class="calculator">
      <div class="info-label">합계금액을 알고 있는 경우</div>
      <div class="input-group">
        <input type="text" id="totalInput" placeholder="합계금액 입력" />
        <button id="calculateTotalButton">계산하기</button>
      </div>
      <div class="note">* 합계금액을 입력하세요.</div>
      <div class="result-wrapper">
        <div class="result-line">
          <div class="label">공급가액</div>
          <div class="value-box">
            <span class="value" id="supplyResult">-</span><span class="unit">원</span>
          </div>
        </div>
        <div class="result-line">
          <div class="label">부가세</div>
          <div class="value-box">
            <span class="value" id="vatResult">-</span><span class="unit">원</span>
          </div>
        </div>
      </div>
      <div class="reset-button">
        <button id="resetTotalButton">초기화</button>
      </div>
    </div>

    <!-- 공급가액 알고 있는 경우 -->
    <div class="calculator">
      <div class="info-label">공급가액을 알고 있는 경우</div>
      <div class="input-group">
        <input type="text" id="supplyInput" placeholder="공급가액 입력" />
        <button id="calculateSupplyButton">계산하기</button>
      </div>
      <div class="note">* 공급가액을 입력하세요.</div>
      <div class="result-wrapper">
        <div class="result-line">
          <div class="label">합계금액</div>
          <div class="value-box">
            <span class="value" id="totalResult">-</span><span class="unit">원</span>
          </div>
        </div>
        <div class="result-line">
          <div class="label">부가세</div>
          <div class="value-box">
            <span class="value" id="vatSupplyResult">-</span><span class="unit">원</span>
          </div>
        </div>
      </div>
      <div class="reset-button">
        <button id="resetSupplyButton">초기화</button>
      </div>
    </div>
  </section>
</main>

<footer>
  <p>© 2025 YouNeedThis. All rights reserved.</p>
</footer>

<script src="../assets/js/main.js"></script>
<script>
  function addEnterKey(inputElem, button) {
    inputElem.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        button.click();
      }
    });
  }

  const totalInput = document.getElementById("totalInput");
  const calculateTotalButton = document.getElementById("calculateTotalButton");
  const resetTotalButton = document.getElementById("resetTotalButton");
  const supplyResult = document.getElementById("supplyResult");
  const vatResult = document.getElementById("vatResult");

  addEnterKey(totalInput, calculateTotalButton);

  calculateTotalButton.addEventListener("click", () => {
    const total = parseFloat(totalInput.value.replace(/,/g, ''));
    if (!isNaN(total) && total > 0) {
      const supply = Math.round(total / 1.1);
      const vat = total - supply;
      supplyResult.textContent = supply.toLocaleString();
      vatResult.textContent = vat.toLocaleString();
    }
  });

  resetTotalButton.addEventListener("click", () => {
    totalInput.value = '';
    supplyResult.textContent = '-';
    vatResult.textContent = '-';
  });

  const supplyInput = document.getElementById("supplyInput");
  const calculateSupplyButton = document.getElementById("calculateSupplyButton");
  const resetSupplyButton = document.getElementById("resetSupplyButton");
  const totalResult = document.getElementById("totalResult");
  const vatSupplyResult = document.getElementById("vatSupplyResult");

  addEnterKey(supplyInput, calculateSupplyButton);

  calculateSupplyButton.addEventListener("click", () => {
    const supply = parseFloat(supplyInput.value.replace(/,/g, ''));
    if (!isNaN(supply) && supply > 0) {
      const total = Math.round(supply * 1.1);
      const vat = total - supply;
      totalResult.textContent = total.toLocaleString();
      vatSupplyResult.textContent = vat.toLocaleString();
    }
  });

  resetSupplyButton.addEventListener("click", () => {
    supplyInput.value = '';
    totalResult.textContent = '-';
    vatSupplyResult.textContent = '-';
  });
</script>

</body>
</html>
